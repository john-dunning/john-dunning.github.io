<script language="JavaScript1.2">

function HandleKeyPress(
	inEvent)
{
	switch (inEvent.keyCode) {
		case 18:	// ctrl-R
			location.reload();
			break;

		case 23:	// ctrl-W
		case 17:	// ctrl-Q
			window.close();
			break;

//		case 97:	// a
		case 45:	// -
			gResultsArea.SelectPreviousSecurity();
			break;

		case 38:	// up key
			if (inEvent.altKey) {
				gResultsArea.SelectPreviousSecurity();
			}
			break;

//		case 122:	// z
		case 43:	// +
			gResultsArea.SelectNextSecurity();
			break;

		case 40:	// down key
			if (inEvent.altKey) {
				gResultsArea.SelectNextSecurity();
			}
			break;

	}
}

</script>
